events { worker_connections 1024; }

http {
    upstream auth_service      { server auth_service:8001; }
    upstream book_service      { server book_service:8002; }
    upstream order_service     { server order_service:8003; }
    upstream customer_service  { server customer_service:8004; }
    upstream staff_service     { server staff_service:8005; }
    upstream marketing_service { server marketing_service:8006; }
    upstream inventory_service { server inventory_service:8007; }
    upstream content_service   { server content_service:8008; }
    upstream interaction_service { server interaction_service:8009; }
    upstream analytics_service { server analytics_service:8010; }
    upstream notification_service { server notification_service:8011; }

    server {
        listen 80;

        location /auth/      { proxy_pass http://auth_service/; }
        location /books/     { proxy_pass http://book_service/; }
        location /orders/    { proxy_pass http://order_service/; }
        location /customers/ { proxy_pass http://customer_service/; }
        location /staff/     { proxy_pass http://staff_service/; }
        location /marketing/ { proxy_pass http://marketing_service/; }
        location /inventory/ { proxy_pass http://inventory_service/; }
        location /content/   { proxy_pass http://content_service/; }
        location /interaction/ { proxy_pass http://interaction_service/; }
        location /analytics/ { proxy_pass http://analytics_service/; }
        location /notifications/ { proxy_pass http://notification_service/; }
    }
}
